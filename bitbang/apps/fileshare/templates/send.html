<!DOCTYPE html>
<html>
<head>
    <title>{{ filename }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        .filename { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; word-break: break-all; }
        .size { color: #666; margin-bottom: 1.5rem; }
        .download-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover { background: #0056b3; }
        .download-btn:disabled { background: #6c757d; cursor: default; }
        .branding {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #999;
        }
        .branding a { color: #666; }
        .progress-container {
            display: none;
            margin-top: 1rem;
        }
        .progress-bar-bg {
            background: #e9ecef;
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-bar-fill {
            background: #007bff;
            height: 100%;
            width: 0%;
            transition: width 0.1s ease-out;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">{{ icon }}</div>
        <div class="filename">{{ filename }}</div>
        <div class="size" id="size-display">{{ size }}</div>
        <a href="download" class="download-btn" id="download-btn">Download</a>
        <div class="progress-container" id="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
            <div class="progress-stats">
                <span id="progress-size">0 B / {{ size }}</span>
                <span id="progress-speed">-- MB/s</span>
            </div>
        </div>
        <div class="branding">
            Shared via <a href="https://bitba.ng">BitBang</a><br>
            P2P &middot; Encrypted &middot; No account
        </div>
    </div>
    <script>
        function formatSize(bytes) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return (i > 0 ? bytes.toFixed(1) : bytes) + ' ' + units[i];
        }

        document.getElementById('download-btn').addEventListener('click', async function(e) {
            e.preventDefault();
            const btn = this;
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const progressSize = document.getElementById('progress-size');
            const progressSpeed = document.getElementById('progress-speed');

            btn.textContent = 'Downloading...';
            btn.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';

            try {
                const res = await fetch('download');
                if (!res.ok) throw new Error('Download failed');

                const totalSize = parseInt(res.headers.get('Content-Length') || '0', 10);
                const reader = res.body.getReader();
                const chunks = [];
                let receivedSize = 0;
                const startTime = Date.now();
                let lastUpdate = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    receivedSize += value.length;

                    const now = Date.now();
                    if (now - lastUpdate > 50) {
                        lastUpdate = now;
                        const elapsed = (now - startTime) / 1000;
                        const speed = elapsed > 0 ? receivedSize / elapsed : 0;

                        if (totalSize > 0) {
                            progressBar.style.width = ((receivedSize / totalSize) * 100).toFixed(1) + '%';
                        }
                        progressSize.textContent = formatSize(receivedSize) + ' / ' + (totalSize > 0 ? formatSize(totalSize) : '?');
                        progressSpeed.textContent = (speed / (1024 * 1024)).toFixed(1) + ' MB/s';
                    }
                }

                const blob = new Blob(chunks);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '{{ filename }}';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                btn.textContent = 'Download';
                btn.disabled = false;
                progressContainer.style.display = 'none';
            } catch (err) {
                btn.textContent = 'Download failed';
                btn.disabled = false;
                progressContainer.style.display = 'none';
                setTimeout(() => btn.textContent = 'Download', 2000);
            }
        });
    </script>
</body>
</html>
